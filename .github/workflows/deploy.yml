name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-monitor
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Monitor
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 45m
        script: |
          set -euo pipefail

          if command -v flock >/dev/null 2>&1; then
            exec 9>/tmp/monitor_deploy.lock
            if ! flock -n 9; then
              echo "ERROR: outro deploy ja esta em execucao no servidor."
              exit 1
            fi
          fi

          on_error() {
            echo "ERROR: deploy falhou. Estado atual:"
            docker compose ps || true
            echo "Ultimos logs (backend/worker/frontend):"
            docker compose logs --tail=200 backend worker frontend || true
          }
          trap on_error ERR

          echo "========================================="
          echo "Iniciando deploy do Monitor"
          echo "========================================="

          cd /root/monitor || exit 1
          PREV_COMMIT="$(git rev-parse HEAD 2>/dev/null || true)"

          if [ ! -f deploy/backend.env ]; then
            echo "ERROR: arquivo deploy/backend.env nao encontrado em /root/monitor/deploy/backend.env"
            exit 1
          fi

          echo "Sincronizando com origin/main..."
          git fetch --depth=1 --no-show-forced-updates origin main
          git reset --hard origin/main

          echo "Ultimo commit:"
          git log -1 --oneline
          CURRENT_COMMIT="$(git rev-parse HEAD)"
          echo "Commit anterior: ${PREV_COMMIT:-N/A}"
          echo "Commit atual: ${CURRENT_COMMIT}"

          SHOULD_BUILD_FRONTEND=1
          if [ -n "${PREV_COMMIT}" ]; then
            CHANGED_FILES="$(git diff --name-only "${PREV_COMMIT}" "${CURRENT_COMMIT}" || true)"
            echo "Arquivos alterados desde o deploy anterior:"
            echo "${CHANGED_FILES:-<nenhum>}"
            if ! echo "${CHANGED_FILES}" | grep -Eq '^(src/|public/|package\.json$|package-lock\.json$|Dockerfile\.frontend$|nginx\.conf$|\.dockerignore$)'; then
              SHOULD_BUILD_FRONTEND=0
            fi
          fi

          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          echo "Limpando artefatos locais pesados..."
          rm -rf node_modules build backend/.venv backend/.pytest_cache || true
          find . -type d -name "__pycache__" -prune -exec rm -rf {} + || true

          echo "Uso de disco antes do build:"
          docker system df || true
          echo "Recursos do host antes do build:"
          free -h || true
          df -h || true

          echo "Build backend (imagem base usada por backend + worker):"
          time docker compose --progress=plain build --pull backend

          if [ "${SHOULD_BUILD_FRONTEND}" -eq 1 ]; then
            echo "Build frontend:"
            if command -v timeout >/dev/null 2>&1; then
              time timeout 25m docker compose --progress=plain build --pull frontend
            else
              time docker compose --progress=plain build --pull frontend
            fi
          else
            echo "Sem alteracoes de frontend. Pulando build do frontend."
          fi

          echo "Subindo containers..."
          docker compose up -d --remove-orphans

          echo "Aguardando containers..."
          sleep 5

          echo "Status dos containers:"
          docker compose ps

          echo "Limpeza segura (opcional)..."
          docker image prune -f --filter "until=168h"

          echo "========================================="
          echo "Deploy concluido!"
          echo "========================================="
