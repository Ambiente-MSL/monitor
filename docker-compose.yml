services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dashboardsocial-backend:latest
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      FRONTEND_ORIGIN: https://monitor.mslestrategia.com.br
      META_SYNC_AUTOSTART: "0"
      WEB_CONCURRENCY: "2"
      # coloque secrets no Dokploy (env), não aqui
    depends_on:
      - db
    expose:
      - "3001"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/api/instagram/posts?limit=1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  worker:
    image: dashboardsocial-backend:latest
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    command: python scheduler_runner.py
    depends_on:
      - backend
      - db
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: https://monitor.mslestrategia.com.br
    image: dashboardsocial-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data: